<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta 
      http-equiv="Content-Security-Policy" 
      content="default-src 'self' 'unsafe-inline' 'unsafe-eval' http://localhost:5000 ws://localhost:5000 data: blob:; img-src 'self' data: blob: https:;" 
    />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WoodLand Furniture</title>
    
    <style>
      /* Base setup to fill the screen */
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #F9F8F6; /* Warm, elegant off-white background */
      }

      /* Center everything perfectly */
      .initial-loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        animation: fadeIn 1.2s ease-out forwards;
      }

      /* Logo with a smooth floating animation */
      .loader-logo {
        width: 140px; /* Adjust depending on your actual logo size */
        height: auto;
        margin-bottom: 30px;
        animation: float 3s ease-in-out infinite;
        /* Optional drop shadow for depth */
        filter: drop-shadow(0px 10px 8px rgba(0, 0, 0, 0.05));
      }

      /* Elegant, subtle pulsing text */
      .loader-text {
        color: #5A4A42; /* Deep, warm wood tone */
        font-size: 0.9rem;
        font-weight: 500;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 20px;
        animation: pulseText 2s infinite ease-in-out;
      }

      /* Minimalist sliding loading bar */
      .loader-bar-container {
        width: 180px;
        height: 2px;
        background-color: #E2DCD0; /* Light beige track */
        border-radius: 4px;
        overflow: hidden;
        position: relative;
      }

      .loader-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        background-color: #8C6A53; /* Medium wood accent color */
        border-radius: 4px;
        animation: slideBar 1.8s infinite ease-in-out;
      }

      /* --- Animations --- */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-12px); }
      }

      @keyframes pulseText {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }

      @keyframes slideBar {
        0% { left: -40%; width: 40%; }
        50% { left: 30%; width: 60%; }
        100% { left: 100%; width: 40%; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader-container">
        <img src="/src/assets/logo.png" alt="WoodLand Furniture Logo" class="loader-logo" />
        
        <div class="loader-text">Preparing your space</div>
        
        <div class="loader-bar-container">
          <div class="loader-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
